<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Credit Risk Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #f8fbff);
    margin: 0;
}

.navbar {
    background: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.logo {
    font-weight: 700;
    color: #2563eb;
    font-size: 22px;
}

.container {
    padding: 30px 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.metric {
    font-size: 30px;
    font-weight: bold;
}

.section-title {
    margin-top: 40px;
    margin-bottom: 15px;
    font-weight: 600;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.btn {
    background: #2563eb;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.btn:hover {
    background: #1d4ed8;
}

.progress {
    height: 10px;
    background: #e5e7eb;
    border-radius: 10px;
    margin-top: 10px;
}

.progress-bar {
    height: 10px;
    background: #22c55e;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Evoastra AI</div>
    <div>Credit Risk Dashboard</div>
</div>

<div class="container">

    <!-- METRICS -->
    <div class="grid">
        <div class="card"><div class="metric">0.94</div>Model Accuracy</div>
        <div class="card"><div class="metric">190+</div>AMEX Features</div>
        <div class="card"><div class="metric">150K</div>GMSC Records</div>
    </div>

    <!-- INPUT -->
    <div class="section-title">Enter Customer Financial Details</div>

    <div class="grid">

        <div class="card">
            Dataset
            <select id="dataset">
                <option value="AMEX">AMEX</option>
                <option value="GMSC">GMSC</option>
            </select>
        </div>

        <div class="card">
            Payment Score
            <input id="payment" type="number" placeholder="700">
        </div>

        <div class="card">
            Account Balance
            <input id="balance" type="number" placeholder="40000">
        </div>

        <div class="card">
            Debt Ratio
            <input id="debt" type="number" placeholder="0.5">
        </div>

    </div>

    <br>

    <button class="btn" onclick="predict()">Run AI Prediction</button>

    <!-- RESULT -->
    <div class="section-title">Prediction Result</div>

    <div class="card" id="result">
        <p>Click button to see result</p>
    </div>

</div>

<!-- JAVASCRIPT -->
<script>

async function predict() {

    const dataset = document.getElementById("dataset").value;
    const payment = document.getElementById("payment").value;
    const balance = document.getElementById("balance").value;
    const debt = document.getElementById("debt").value;

    const data = {
        dataset: dataset,

        payment_score: parseFloat(payment),
        balance: parseFloat(balance),
        days_due: 5,
        risk_score: 3,
        spending: 20000,
        delay_count: 2,

        utilization: 0.3,
        age: 30,
        past_due: 1,
        debt_ratio: parseFloat(debt),
        income: 50000,
        open_credit: 5
    };

    try {
        const response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").innerHTML = `
            <h3>Risk Score: ${result.probability}</h3>
            <p><b>Risk Level:</b> ${result.risk_level}</p>
            <p>${result.message}</p>
        `;

    } catch (error) {
        document.getElementById("result").innerHTML = "⚠️ Server error";
    }
}

</script>

</body>
</html>
